version: "3.9"

services:
  prahari:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      APP_ENV: development
    volumes:
      - ./app:/app/app   # live-reload friendly mount
    command: >
      uvicorn app.main:app
        --host 0.0.0.0
        --port 8000
        --reload
